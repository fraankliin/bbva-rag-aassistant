version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ../front-assistant-bbva
      dockerfile: Dockerfile
    ports:
      - "5500:80"
    restart: always
    depends_on:
      - backend